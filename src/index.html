<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta
			name="viewport"
			content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>Luxury Travel</title>
</head>
<body>
       <div class="wrapper">

		               <div class="header">
			                 <div class="header__top">
				                <div class="container">
					             <div class="header__inner">
					                 <div class="header__contacts">
						                 <span itemprop="telephone"
						                       class="contacts header__phone">

							                 <a href="tel:+14200006000"
							                    title="Call us">
								                  <span class="icon icon-phone">&#xe801;</span>
								                 +1 420-000-6000
							                 </a>
						                 </span>
						                 <span itemprop="email"
						                       class="contacts header__email">

							                 <a
									                 href="mailto:hello@website.com?subject=My question" title="Write to us">
								                 <span class="icon icon-mail">&#xf0e0;</span>
								                 hello@website.com
							                 </a>
						                 </span>
						                 <span itemprop="openingHours"
						                       class="contacts header__shedule">

							                 <a href="#!" title="Working hours">
								                  <span class="icon icon-clock">&#xe802;</span>
								                 6am - 11pm
							                 </a>
						                 </span>
					                 </div>
							             <!-- /.header__header__contacts -->

					                 <div class="header__links">
						                 <ul class="links_social">
							                 <li><a title="Facebook"
							                        href="#!"><i
									                 class="icon icon-facebook">&#xf09a;</i></a></li>
							                 <li><a title="Twitter"
							                        href="#!"><i
									                 class="icon icon-twitter">&#xf099;</i></a></li>
							                 <li><a title="Youtube"
							                        href="#!"><i
									                 class="icon icon-youtube">&#xf167;</i></a></li>
							                 <li><a title="Instagram"
							                        href="#!"><i
									                 class="icon icon-instagram">&#xf16d;</i></a></li>
							                 <li><a title="Whatsapp"
							                        href="#!"><i
									                 class="icon icon-whatsapp">&#xf232;</i> </a></li>
						                 </ul> <!-- /.header__links -->


						                 <div class="header__search">
							                 <span title="Search tour">
								                 <i class="icon icon-search">&#xe803;</i>
							                 </span>

						                 </div>    <!-- /.header__search -->

					                 </div>
					             </div>
					                <!-- /.header__inner -->





				                </div> <!-- /.container -->
			                 </div><!-- /.header__top -->
			               <div class="header__bottom">
				              
				               <div class="header__logo"></div>
				               <!-- /.header__logo -->
				               <div class="header__menu"></div>
				               <!-- /.header__menu -->
			               </div><!-- /.header__bottom -->
		               </div><!-- /.header -->
	     

       </div><!-- /.wrapper-->
</body>
</html>
